<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engineer Portal | Top Boiler Care</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --black: #0a0a0a; --black-card: #1a1a1a;
  --yellow: #f5c518; --yellow-hover: #ffd740; --yellow-dim: rgba(245,197,24,0.08);
  --blue: #2d7ff9; --white: #ffffff; --gray-100: #f5f5f5; --gray-200: #e0e0e0;
  --gray-400: #9e9e9e; --gray-600: #6b6b6b; --gray-800: #333333;
  --radius: 10px; --radius-lg: 16px; --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  --sidebar: 240px;
}
body { font-family: 'DM Sans', sans-serif; background: var(--gray-100); color: var(--gray-800); min-height: 100vh; }
.sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: var(--sidebar); background: var(--black); padding: 28px 20px; display: flex; flex-direction: column; z-index: 100; border-right: 1px solid rgba(255,255,255,0.06); }
.sidebar-logo { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; font-size: 1.1rem; color: var(--white); margin-bottom: 4px; }
.sidebar-logo span { color: var(--yellow); }
.sidebar-role { font-size: 0.78rem; color: var(--gray-600); margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.08em; }
.live-chip { display: inline-flex; align-items: center; gap: 6px; font-size: 0.7rem; color: var(--gray-400); background: rgba(255,255,255,0.05); border-radius: 100px; padding: 3px 10px; margin-bottom: 24px; }
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: #16a34a; animation: pulse 2s infinite; }
.live-dot.off { background: var(--gray-600); animation: none; }
@keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.6); } 70% { box-shadow: 0 0 0 6px rgba(34,197,94,0); } 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); } }
.sidebar-bottom { margin-top: auto; }
.btn-signout { width: 100%; padding: 10px 14px; background: none; border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius); color: var(--gray-400); font-size: 0.88rem; cursor: pointer; transition: all var(--transition); font-family: 'DM Sans', sans-serif; }
.btn-signout:hover { border-color: rgba(255,255,255,0.3); color: var(--white); }
.main { margin-left: var(--sidebar); padding: 32px; }
.page-header { margin-bottom: 28px; }
.page-title { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1.6rem; color: var(--black); font-weight: 800; letter-spacing: -0.02em; }
.page-subtitle { font-size: 0.9rem; color: var(--gray-600); margin-top: 4px; }
.stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 28px; }
.stat-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius-lg); padding: 24px 20px; }
.stat-label { font-size: 0.8rem; color: var(--gray-600); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
.stat-value { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 2rem; font-weight: 800; color: var(--black); }
.card { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius-lg); overflow: hidden; }
.card-header { padding: 20px 24px; border-bottom: 1px solid var(--gray-200); }
.card-title { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1rem; font-weight: 700; color: var(--black); }
.job-card { padding: 20px 24px; border-bottom: 1px solid var(--gray-100); }
.job-card:last-child { border-bottom: none; }
.job-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
.job-address { font-weight: 600; font-size: 0.95rem; color: var(--black); }
.badge { display: inline-block; padding: 3px 10px; border-radius: 100px; font-size: 0.75rem; font-weight: 600; }
.badge-scheduled { background: rgba(45,127,249,0.1); color: var(--blue); }
.badge-completed { background: rgba(34,197,94,0.1); color: #16a34a; }
.job-meta { display: flex; gap: 20px; font-size: 0.85rem; color: var(--gray-600); margin-bottom: 14px; flex-wrap: wrap; }
.job-meta span { display: flex; align-items: center; gap: 4px; }
.upload-area { background: var(--gray-100); border: 1px dashed var(--gray-200); border-radius: var(--radius); padding: 16px; }
.upload-area label { display: block; font-size: 0.83rem; font-weight: 600; color: var(--gray-800); margin-bottom: 8px; }
.upload-row { display: flex; gap: 10px; align-items: center; }
.upload-row input[type="file"] { flex: 1; font-size: 0.85rem; }
.btn { padding: 9px 18px; border-radius: var(--radius); font-weight: 600; font-size: 0.88rem; cursor: pointer; transition: all var(--transition); font-family: 'DM Sans', sans-serif; border: none; }
.btn-primary { background: var(--yellow); color: var(--black); }
.btn-primary:hover { background: var(--yellow-hover); }
.btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
.btn-ghost { background: var(--gray-100); color: var(--gray-800); }
.btn-ghost:hover { background: var(--gray-200); }
.link-btn { background: none; border: none; color: var(--blue); font-size: 0.85rem; cursor: pointer; font-weight: 500; padding: 0; text-decoration: underline; font-family: inherit; }
.link-btn:hover { color: #1b5fd0; }
.cert-uploaded { font-size: 0.85rem; color: #16a34a; font-weight: 600; display: flex; align-items: center; gap: 6px; }
.empty-state { padding: 48px 24px; text-align: center; color: var(--gray-400); font-size: 0.9rem; }
.loading { padding: 32px; text-align: center; color: var(--gray-400); }
.toast { position: fixed; bottom: 24px; right: 24px; background: #16a34a; color: white; padding: 12px 20px; border-radius: var(--radius); font-weight: 600; font-size: 0.9rem; display: none; z-index: 999; }
.toast.error { background: #ef4444; }
</style>
</head>
<body>

<div class="sidebar">
  <div>
    <div class="sidebar-logo">Top Boiler <span>Care</span></div>
    <div class="sidebar-role" id="engName">Engineer</div>
    <div class="live-chip"><span class="live-dot off" id="liveDot"></span><span id="liveLabel">Connecting...</span></div>
  </div>
  <div class="sidebar-bottom">
    <button class="btn-signout" onclick="signOut()">Sign out</button>
  </div>
</div>

<div class="main">
  <div class="page-header">
    <div class="page-title">My Jobs</div>
    <div class="page-subtitle">Jobs assigned to you</div>
  </div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">Scheduled</div><div class="stat-value" id="statScheduled">-</div></div>
    <div class="stat-card"><div class="stat-label">Completed</div><div class="stat-value" id="statCompleted">-</div></div>
  </div>
  <div class="card">
    <div class="card-header"><span class="card-title">Assigned Jobs</span></div>
    <div id="jobsList"><div class="loading">Loading your jobs...</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var SUPABASE_URL = 'https://metssgddcebwfmpfeipj.supabase.co';
var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1ldHNzZ2RkY2Vid2ZtcGZlaXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MTU0MDgsImV4cCI6MjA5MjE5MTQwOH0.xwNi1fuQMQD1q-iLHBbmsbCdGAHWY0BD-Al9_2mt4L8';
var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
var currentEngineerId = null;

function esc(s) { return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function showToast(msg, kind) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast' + (kind === 'error' ? ' error' : '');
  t.style.display = 'block';
  setTimeout(function(){ t.style.display = 'none'; }, 3000);
}

function openFile(bucket, path) {
  if (!path) return;
  supabase.storage.from(bucket).createSignedUrl(path, 300).then(function(res) {
    if (res.error || !res.data) { showToast('Could not open file', 'error'); return; }
    window.open(res.data.signedUrl, '_blank');
  });
}

supabase.auth.getSession().then(function(res) {
  if (!res.data.session) { window.location.href = '/portal/index.html'; return; }
  var userId = res.data.session.user.id;
  supabase.from('profiles').select('role, full_name').eq('id', userId).single()
    .then(function(r) {
      if (r.error || !r.data || r.data.role !== 'engineer') { window.location.href = '/portal/index.html'; return; }
      document.getElementById('engName').textContent = r.data.full_name;
      supabase.from('engineers').select('id').eq('user_id', userId).single()
        .then(function(e) {
          if (!e.data) { showToast('Engineer record not found. Contact admin.', 'error'); return; }
          currentEngineerId = e.data.id;
          loadJobs();
          setupRealtime();
        });
    });
});

function setupRealtime() {
  var dot = document.getElementById('liveDot');
  var label = document.getElementById('liveLabel');
  supabase
    .channel('engineer-stream')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'jobs', filter: 'engineer_id=eq.' + currentEngineerId }, function() { loadJobs(); })
    .subscribe(function(status) {
      if (status === 'SUBSCRIBED') { dot.classList.remove('off'); label.textContent = 'Live'; }
      else if (status === 'CLOSED' || status === 'CHANNEL_ERROR') { dot.classList.add('off'); label.textContent = 'Offline'; }
    });
}

function loadJobs() {
  supabase.from('jobs').select('*, agencies(name)').eq('engineer_id', currentEngineerId).order('job_date', { ascending: true })
    .then(function(res) {
      var jobs = res.data || [];
      document.getElementById('statScheduled').textContent = jobs.filter(function(j) { return j.status === 'scheduled'; }).length;
      document.getElementById('statCompleted').textContent = jobs.filter(function(j) { return j.status === 'completed'; }).length;
      if (!jobs.length) { document.getElementById('jobsList').innerHTML = '<div class="empty-state">No jobs assigned to you yet.</div>'; return; }
      var html = '';
      jobs.forEach(function(j) {
        html += '<div class="job-card">';
        html += '<div class="job-card-header"><div class="job-address">' + esc(j.property_address) + '</div><span class="badge badge-' + esc(j.status) + '">' + esc(j.status) + '</span></div>';
        html += '<div class="job-meta">';
        html += '<span>&#x1F4CB; ' + esc(j.job_type) + '</span>';
        if (j.job_date) html += '<span>&#x1F4C5; ' + esc(j.job_date) + '</span>';
        if (j.tenant_name) html += '<span>&#x1F464; ' + esc(j.tenant_name) + '</span>';
        if (j.tenant_phone) html += '<span>&#x1F4DE; ' + esc(j.tenant_phone) + '</span>';
        if (j.agencies) html += '<span>&#x1F3E0; ' + esc(j.agencies.name) + '</span>';
        if (j.price != null) html += '<span>&pound;' + esc(j.price) + '</span>';
        html += '</div>';
        if (j.notes) html += '<div style="font-size:0.85rem;color:var(--gray-600);margin-bottom:12px;padding:10px 14px;background:var(--gray-100);border-radius:var(--radius);">&#x1F4DD; ' + esc(j.notes) + '</div>';
        if (j.certificate_url) {
          html += '<div class="cert-uploaded">&#10003; Certificate uploaded &mdash; <button class="link-btn" onclick="openFile(\'certificates\',\'' + esc(j.certificate_url) + '\')">View</button></div>';
        } else {
          html += '<div class="upload-area">';
          html += '<label>Upload Gas Safety Certificate (PDF)</label>';
          html += '<div class="upload-row">';
          html += '<input type="file" id="cert_' + esc(j.id) + '" accept="application/pdf">';
          html += '<button class="btn btn-primary" onclick="uploadCertificate(\'' + esc(j.id) + '\')" id="uploadBtn_' + esc(j.id) + '">Upload</button>';
          html += '</div></div>';
        }
        html += '</div>';
      });
      document.getElementById('jobsList').innerHTML = html;
    });
}

function uploadCertificate(jobId) {
  var fileInput = document.getElementById('cert_' + jobId);
  var btn = document.getElementById('uploadBtn_' + jobId);
  var file = fileInput.files[0];
  if (!file) { showToast('Select a PDF file first.', 'error'); return; }
  btn.disabled = true; btn.textContent = 'Uploading...';
  var path = jobId + '_' + Date.now() + '.pdf';
  supabase.storage.from('certificates').upload(path, file, { contentType: 'application/pdf' })
    .then(function(res) {
      if (res.error) { showToast('Upload failed: ' + res.error.message, 'error'); btn.disabled = false; btn.textContent = 'Upload'; return; }
      supabase.from('jobs').update({ certificate_url: path, status: 'completed' }).eq('id', jobId)
        .then(function(u) {
          if (u.error) { showToast('Saved file but could not update job: ' + u.error.message, 'error'); btn.disabled = false; btn.textContent = 'Upload'; return; }
          showToast('Certificate uploaded');
          loadJobs();
        });
    });
}

function signOut() { supabase.auth.signOut().then(function() { window.location.href = '/portal/index.html'; }); }
</script>
</body>
</html>
