<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Boiler Care | Portal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --black: #0a0a0a;
  --black-light: #141414;
  --black-card: #1a1a1a;
  --yellow: #f5c518;
  --yellow-hover: #ffd740;
  --yellow-dim: rgba(245, 197, 24, 0.08);
  --blue: #2d7ff9;
  --white: #ffffff;
  --gray-100: #f5f5f5;
  --gray-200: #e0e0e0;
  --gray-400: #9e9e9e;
  --gray-600: #6b6b6b;
  --gray-800: #333333;
  --radius: 10px;
  --radius-lg: 16px;
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--black);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  position: relative;
  overflow: hidden;
}
body::before {
  content: '';
  position: absolute; top: -40%; right: -20%;
  width: 700px; height: 700px;
  background: radial-gradient(circle, rgba(245,197,24,0.06) 0%, transparent 70%);
  pointer-events: none;
}
body::after {
  content: '';
  position: absolute; bottom: -30%; left: -10%;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(45,127,249,0.04) 0%, transparent 70%);
  pointer-events: none;
}
.login-card {
  background: var(--black-card);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-lg);
  padding: 48px 40px;
  width: 100%;
  max-width: 440px;
  position: relative;
  z-index: 1;
}
.logo {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 800; font-size: 1.4rem; color: var(--white);
  letter-spacing: -0.02em; margin-bottom: 8px;
}
.logo span { color: var(--yellow); }
.login-subtitle {
  font-size: 0.9rem; color: var(--gray-400);
  margin-bottom: 36px;
}
.form-group { margin-bottom: 20px; }
.form-group label {
  display: block; font-size: 0.85rem; font-weight: 600;
  color: var(--gray-400); margin-bottom: 8px;
  text-transform: uppercase; letter-spacing: 0.05em;
}
.form-group input {
  width: 100%; padding: 13px 16px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius);
  font-size: 0.95rem; font-family: 'DM Sans', sans-serif;
  color: var(--white);
  transition: border-color var(--transition);
}
.form-group input:focus {
  outline: none;
  border-color: var(--yellow);
  background: rgba(245,197,24,0.04);
}
.form-group input::placeholder { color: var(--gray-600); }
.btn-login {
  width: 100%; background: var(--yellow); color: var(--black);
  border: none; padding: 14px; border-radius: var(--radius);
  font-weight: 700; font-size: 1rem; cursor: pointer;
  transition: all var(--transition); font-family: 'DM Sans', sans-serif;
  margin-top: 8px;
}
.btn-login:hover { background: var(--yellow-hover); transform: translateY(-1px); }
.btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
.error-msg {
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.3);
  border-radius: var(--radius);
  padding: 12px 16px;
  font-size: 0.88rem; color: #fca5a5;
  margin-bottom: 16px; display: none;
}
.back-link {
  display: block; text-align: center;
  margin-top: 24px; font-size: 0.88rem;
  color: var(--gray-600); text-decoration: none;
  transition: color var(--transition);
}
.back-link:hover { color: var(--gray-400); }
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">Top Boiler <span>Care</span></div>
  <p class="login-subtitle">Portal — Sign in to your account</p>
  <div class="error-msg" id="errorMsg"></div>
  <div class="form-group">
    <label for="email">Email address</label>
    <input type="email" id="email" placeholder="you@example.com">
  </div>
  <div class="form-group">
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="••••••••">
  </div>
  <button class="btn-login" id="loginBtn" onclick="handleLogin()">Sign in</button>
  <a href="/" class="back-link">← Back to main site</a>
</div>

<script>
var SUPABASE_URL = 'https://metssgddcebwfmpfeipj.supabase.co';
var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1ldHNzZ2RkY2Vid2ZtcGZlaXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MTU0MDgsImV4cCI6MjA5MjE5MTQwOH0.xwNi1fuQMQD1q-iLHBbmsbCdGAHWY0BD-Al9_2mt4L8';

var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// If already logged in, redirect
supabase.auth.getSession().then(function(result) {
  if (result.data.session) {
    redirectByRole();
  }
});

function redirectByRole() {
  supabase.auth.getUser().then(function(result) {
    if (!result.data.user) return;
    supabase.from('profiles').select('role').eq('id', result.data.user.id).single()
      .then(function(res) {
        if (!res.data) return;
        if (res.data.role === 'admin') window.location.href = '/portal/admin.html';
        else if (res.data.role === 'agency') window.location.href = '/portal/agency.html';
        else if (res.data.role === 'engineer') window.location.href = '/portal/engineer.html';
      });
  });
}

function handleLogin() {
  var email = document.getElementById('email').value.trim();
  var password = document.getElementById('password').value;
  var errorEl = document.getElementById('errorMsg');
  var btn = document.getElementById('loginBtn');

  if (!email || !password) {
    errorEl.textContent = 'Please enter your email and password.';
    errorEl.style.display = 'block';
    return;
  }

  errorEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Signing in...';

  supabase.auth.signInWithPassword({ email: email, password: password })
    .then(function(result) {
      if (result.error) {
        errorEl.textContent = 'Invalid email or password. Please try again.';
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign in';
        return;
      }
      redirectByRole();
    });
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') handleLogin();
});
</script>
</body>
</html>
