<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agency Portal | Top Boiler Care</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --black: #0a0a0a; --black-card: #1a1a1a;
  --yellow: #f5c518; --yellow-hover: #ffd740; --yellow-dim: rgba(245,197,24,0.08);
  --blue: #2d7ff9; --white: #ffffff; --gray-100: #f5f5f5; --gray-200: #e0e0e0;
  --gray-400: #9e9e9e; --gray-600: #6b6b6b; --gray-800: #333333;
  --radius: 10px; --radius-lg: 16px; --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  --sidebar: 240px;
}
body { font-family: 'DM Sans', sans-serif; background: var(--gray-100); color: var(--gray-800); min-height: 100vh; }
.sidebar {
  position: fixed; top: 0; left: 0; bottom: 0; width: var(--sidebar);
  background: var(--black); padding: 28px 20px;
  display: flex; flex-direction: column; z-index: 100;
  border-right: 1px solid rgba(255,255,255,0.06);
}
.sidebar-logo { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; font-size: 1.1rem; color: var(--white); margin-bottom: 4px; }
.sidebar-logo span { color: var(--yellow); }
.sidebar-agency { font-size: 0.78rem; color: var(--gray-600); margin-bottom: 32px; text-transform: uppercase; letter-spacing: 0.08em; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-radius: var(--radius);
  color: var(--gray-400); font-size: 0.9rem; font-weight: 500;
  cursor: pointer; transition: all var(--transition); margin-bottom: 4px;
  border: none; background: none; width: 100%; text-align: left;
}
.nav-item:hover { background: rgba(255,255,255,0.05); color: var(--white); }
.nav-item.active { background: var(--yellow-dim); color: var(--yellow); }
.nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
.sidebar-bottom { margin-top: auto; }
.btn-signout { width: 100%; padding: 10px 14px; background: none; border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius); color: var(--gray-400); font-size: 0.88rem; cursor: pointer; transition: all var(--transition); font-family: 'DM Sans', sans-serif; }
.btn-signout:hover { border-color: rgba(255,255,255,0.3); color: var(--white); }
.main { margin-left: var(--sidebar); padding: 32px; min-height: 100vh; }
.page-header { margin-bottom: 28px; }
.page-title { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1.6rem; color: var(--black); font-weight: 800; letter-spacing: -0.02em; }
.page-subtitle { font-size: 0.9rem; color: var(--gray-600); margin-top: 4px; }
.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px; }
.stat-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius-lg); padding: 24px 20px; }
.stat-label { font-size: 0.8rem; color: var(--gray-600); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
.stat-value { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 2rem; font-weight: 800; color: var(--black); }
.stat-value.red { color: #ef4444; }
.stat-value.green { color: #16a34a; }
.section { display: none; }
.section.active { display: block; }
.card { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius-lg); overflow: hidden; }
.card-header { padding: 20px 24px; border-bottom: 1px solid var(--gray-200); }
.card-title { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1rem; font-weight: 700; color: var(--black); }
table { width: 100%; border-collapse: collapse; }
th { padding: 12px 16px; text-align: left; font-size: 0.78rem; font-weight: 700; color: var(--gray-600); text-transform: uppercase; letter-spacing: 0.06em; background: var(--gray-100); border-bottom: 1px solid var(--gray-200); }
td { padding: 14px 16px; font-size: 0.9rem; color: var(--gray-800); border-bottom: 1px solid var(--gray-100); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--gray-100); }
.badge { display: inline-block; padding: 3px 10px; border-radius: 100px; font-size: 0.75rem; font-weight: 600; }
.badge-scheduled { background: rgba(45,127,249,0.1); color: var(--blue); }
.badge-completed { background: rgba(34,197,94,0.1); color: #16a34a; }
.badge-unpaid { background: rgba(239,68,68,0.1); color: #ef4444; }
.badge-paid { background: rgba(34,197,94,0.1); color: #16a34a; }
.btn { padding: 7px 14px; border-radius: var(--radius); font-weight: 600; font-size: 0.82rem; cursor: pointer; transition: all var(--transition); font-family: 'DM Sans', sans-serif; border: none; }
.btn-ghost { background: var(--gray-100); color: var(--gray-800); }
.btn-ghost:hover { background: var(--gray-200); }
.empty-state { padding: 48px 24px; text-align: center; color: var(--gray-400); font-size: 0.9rem; }
.loading { padding: 32px; text-align: center; color: var(--gray-400); }
</style>
</head>
<body>

<div class="sidebar">
  <div>
    <div class="sidebar-logo">Top Boiler <span>Care</span></div>
    <div class="sidebar-agency" id="agencyName">Agency Portal</div>
    <button class="nav-item active" onclick="showSection('jobs', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
      Jobs
    </button>
    <button class="nav-item" onclick="showSection('invoices', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Invoices
    </button>
    <button class="nav-item" onclick="showSection('certificates', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Certificates
    </button>
  </div>
  <div class="sidebar-bottom">
    <button class="btn-signout" onclick="signOut()">Sign out</button>
  </div>
</div>

<div class="main">

  <div class="section active" id="section-jobs">
    <div class="page-header">
      <div class="page-title">Your Jobs</div>
      <div class="page-subtitle">All jobs for your properties</div>
    </div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Total Jobs</div><div class="stat-value" id="statTotal">-</div></div>
      <div class="stat-card"><div class="stat-label">Scheduled</div><div class="stat-value" id="statScheduled">-</div></div>
      <div class="stat-card"><div class="stat-label">Unpaid Invoices</div><div class="stat-value red" id="statUnpaid">-</div></div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">All Jobs</span></div>
      <div id="jobsTable"><div class="loading">Loading...</div></div>
    </div>
  </div>

  <div class="section" id="section-invoices">
    <div class="page-header">
      <div class="page-title">Invoices</div>
      <div class="page-subtitle">Download and track your invoices</div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">All Invoices</span></div>
      <div id="invoicesTable"><div class="loading">Loading...</div></div>
    </div>
  </div>

  <div class="section" id="section-certificates">
    <div class="page-header">
      <div class="page-title">Certificates</div>
      <div class="page-subtitle">Download gas safety certificates</div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">All Certificates</span></div>
      <div id="certificatesTable"><div class="loading">Loading...</div></div>
    </div>
  </div>

</div>

<script>
var SUPABASE_URL = 'https://metssgddcebwfmpfeipj.supabase.co';
var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1ldHNzZ2RkY2Vid2ZtcGZlaXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MTU0MDgsImV4cCI6MjA5MjE5MTQwOH0.xwNi1fuQMQD1q-iLHBbmsbCdGAHWY0BD-Al9_2mt4L8';
var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
var currentAgencyId = null;

supabase.auth.getSession().then(function(res) {
  if (!res.data.session) { window.location.href = '/portal/index.html'; return; }
  var userId = res.data.session.user.id;
  supabase.from('profiles').select('role, agency_id').eq('id', userId).single()
    .then(function(r) {
      if (!r.data || r.data.role !== 'agency') { window.location.href = '/portal/index.html'; return; }
      currentAgencyId = r.data.agency_id;
      supabase.from('agencies').select('name').eq('id', currentAgencyId).single()
        .then(function(a) {
          if (a.data) document.getElementById('agencyName').textContent = a.data.name;
        });
      loadJobs();
    });
});

function loadJobs() {
  supabase.from('jobs').select('*').eq('agency_id', currentAgencyId).order('created_at', { ascending: false })
    .then(function(res) {
      var jobs = res.data || [];
      document.getElementById('statTotal').textContent = jobs.length;
      document.getElementById('statScheduled').textContent = jobs.filter(function(j) { return j.status === 'scheduled'; }).length;
      document.getElementById('statUnpaid').textContent = jobs.filter(function(j) { return j.invoice_status === 'unpaid' && j.status === 'completed'; }).length;
      if (!jobs.length) { document.getElementById('jobsTable').innerHTML = '<div class="empty-state">No jobs yet.</div>'; return; }
      var html = '<table><thead><tr><th>Address</th><th>Tenant</th><th>Type</th><th>Date</th><th>Status</th><th>Invoice</th><th>Certificate</th></tr></thead><tbody>';
      jobs.forEach(function(j) {
        html += '<tr>';
        html += '<td>' + j.property_address + '</td>';
        html += '<td>' + (j.tenant_name || '-') + '</td>';
        html += '<td>' + j.job_type + '</td>';
        html += '<td>' + (j.job_date || '-') + '</td>';
        html += '<td><span class="badge badge-' + j.status + '">' + j.status + '</span></td>';
        html += '<td><span class="badge badge-' + j.invoice_status + '">' + j.invoice_status + '</span>' + (j.invoice_url ? ' <a href="' + j.invoice_url + '" target="_blank" class="btn btn-ghost">Download</a>' : '') + '</td>';
        html += '<td>' + (j.certificate_url ? '<a href="' + j.certificate_url + '" target="_blank" class="btn btn-ghost">Download</a>' : 'Pending') + '</td>';
        html += '</tr>';
      });
      html += '</tbody></table>';
      document.getElementById('jobsTable').innerHTML = html;
    });
}

function showSection(name, el) {
  document.querySelectorAll('.section').forEach(function(s) { s.classList.remove('active'); });
  document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });
  document.getElementById('section-' + name).classList.add('active');
  el.classList.add('active');
  if (name === 'invoices') loadInvoicesTable();
  if (name === 'certificates') loadCertificatesTable();
}

function loadInvoicesTable() {
  supabase.from('jobs').select('*').eq('agency_id', currentAgencyId).not('invoice_url', 'is', null).order('created_at', { ascending: false })
    .then(function(res) {
      var jobs = res.data || [];
      if (!jobs.length) { document.getElementById('invoicesTable').innerHTML = '<div class="empty-state">No invoices yet.</div>'; return; }
      var html = '<table><thead><tr><th>Address</th><th>Date</th><th>Price</th><th>Status</th><th>Download</th></tr></thead><tbody>';
      jobs.forEach(function(j) {
        html += '<tr><td>' + j.property_address + '</td><td>' + (j.job_date || '-') + '</td><td>' + (j.price ? '£' + j.price : '-') + '</td><td><span class="badge badge-' + j.invoice_status + '">' + j.invoice_status + '</span></td><td><a href="' + j.invoice_url + '" target="_blank" class="btn btn-ghost">Download PDF</a></td></tr>';
      });
      html += '</tbody></table>';
      document.getElementById('invoicesTable').innerHTML = html;
    });
}

function loadCertificatesTable() {
  supabase.from('jobs').select('*').eq('agency_id', currentAgencyId).not('certificate_url', 'is', null).order('created_at', { ascending: false })
    .then(function(res) {
      var jobs = res.data || [];
      if (!jobs.length) { document.getElementById('certificatesTable').innerHTML = '<div class="empty-state">No certificates yet.</div>'; return; }
      var html = '<table><thead><tr><th>Address</th><th>Tenant</th><th>Date</th><th>Type</th><th>Download</th></tr></thead><tbody>';
      jobs.forEach(function(j) {
        html += '<tr><td>' + j.property_address + '</td><td>' + (j.tenant_name || '-') + '</td><td>' + (j.job_date || '-') + '</td><td>' + j.job_type + '</td><td><a href="' + j.certificate_url + '" target="_blank" class="btn btn-ghost">Download PDF</a></td></tr>';
      });
      html += '</tbody></table>';
      document.getElementById('certificatesTable').innerHTML = html;
    });
}

function signOut() { supabase.auth.signOut().then(function() { window.location.href = '/portal/index.html'; }); }
</script>
</body>
</html>
